backend:
  name: github
  repo: SemihMutlu07/selambuarada.com
  branch: main

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: blog
    label: Yazılar
    folder: src/content/blog
    create: true
    delete: true
    extension: mdx
    format: frontmatter
    slug: "{{slug}}"
    summary: "{{title}} — {{date}}"
    sortable_fields:
      fields: [date, title]
      default:
        field: date
        direction: descending
    fields:
      - { label: "Başlık", name: "title", widget: "string" }
      - { label: "Tarih", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - { label: "Açıklama", name: "description", widget: "string" }
      - { label: "Etiketler", name: "tags", widget: "list", required: false, default: [] }
      - { label: "Taslak", name: "draft", widget: "boolean", default: false, required: false }
      - { label: "OG Görsel", name: "og_image", widget: "string", required: false }
      - { label: "Meta Açıklama", name: "meta_description", widget: "string", required: false }
      - { label: "İçerik", name: "body", widget: "markdown" }
